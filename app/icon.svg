<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="white" stroke-width="20"/>
  <!-- Hour markers -->
  <line x1="256" y1="106" x2="256" y2="130" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="382" x2="256" y2="406" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="106" y1="256" x2="130" y2="256" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="382" y1="256" x2="406" y2="256" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="256" y1="256" x2="196" y2="166" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2 o'clock) -->
  <line x1="256" y1="256" x2="340" y2="176" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="white"/>
  <!-- Globe arc hints (subtle timezone reference) -->
  <path d="M 160 380 A 160 160 0 0 1 100 300" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8" stroke-linecap="round"/>
  <path d="M 352 380 A 160 160 0 0 0 412 300" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8" stroke-linecap="round"/>
</svg>
